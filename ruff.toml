target-version = "py314"  # minimum Python version
line-length = 88         # Black-compatible width

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "RUF",    # Ruff-specific
    "ASYNC",  # flake8-async
    "S",      # flake8-bandit (security)
    "T20",    # flake8-print
    "PTH",    # flake8-use-pathlib
    "LOG",    # flake8-logging
    "G",      # flake8-logging-format
    "PT",     # flake8-pytest-style
    "TRY",    # tryceratops
    "PERF",   # perflint
    "FURB",   # refurb
]
exclude = [
    ".git/**",
    "__pycache__/**",
    "*.pyc",
    ".venv/**",
    "build/**",
    "dist/**",
]
ignore = [
    # Formatter conflicts
    "E501",   # line-too-long — ruff fmt handles this
    "COM812", # missing trailing comma — ruff fmt handles this
    "ISC001", # single-line-implicit-concatenation — ruff fmt handles this
    "E402",   # module-level import not at top — intentional _PYDANTIC_V1_ANCHOR pattern
    # Already accepted technical debt / style
    "BLE001",   # blind except — fix gradually
    "G201",     # .exception vs .error(exc_info=True)
    # High-noise, low-value
    "G004",     # f-string in logging — modern & readable
    "T201",     # print — intentional CLI scripts
    "S104",     # 0.0.0.0 binding — intentional for server
    "LOG004",   # .exception() outside handlers
    "TRY300",   # move to else block
    "TRY003",   # long messages outside exception class
    "TRY301",   # abstract raise to inner function
    "TRY400",   # use logging.exception instead of .error
    # False positives / intentional
    "ASYNC250", # blocking methods in async
    "S105",     # "bearer" is not a password
    "S107",     # same
    "S311",     # random for non-crypto jitter / test data
    "S608",     # f-string SQL — project uses safe column params/constants
    "S324",     # md5 for non-cryptographic hashing is fine
    "RUF002",   # intentional Greek letters (σ)
    "RUF003",   # intentional × / other unicode in comments
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    # pytest / test style
    "S101",  # assert used in tests
    "S104",  # bind to all interfaces in tests
    "S105",  # hardcoded password in test fixtures
    "S106",  # hardcoded password in test calls
    "S108",  # hardcoded temp file path in tests
    "S311",  # pseudo-random in test data
    # annotations & docs
    "ANN001",  # missing type annotation (onerous in tests)
    "ANN201",  # missing return type annotation
    "D100",    # missing module docstring
    "D101",    # missing class docstring
    "D103",    # missing function docstring
    "D104",    # missing package docstring
    "D400",    # docstring must end with period
    "D415",    # docstring first line must end with period
    # boolean traps & magic values
    "FBT001",  # boolean positional arg
    "FBT002",  # boolean default arg
    "FBT003",  # boolean comparison in function call
    "PLR2004", # magic number comparison
    # other test realities
    "ARG001",    # unused function arg (ok in test helpers)
    "ASYNC109",  # async function with timeout
    "ASYNC210",  # blocking calls in async test setup
    "ASYNC230",  # open() in async test helpers
    "ASYNC240",  # pathlib in async test helpers
    "F811",      # redefinition of function (pytest fixtures)
    "RUF012",    # mutable class default
    "RUF059",    # unary negation
    "SLF001",    # access to private member of another class
    "T201",      # print in tests
    "TRY003",    # long message outside exception class
]

[format]
quote-style = "double"     # consistent with project convention
indent-style = "space"     # spaces over tabs
line-ending = "lf"         # consistent Unix line endings
docstring-code-format = true  # auto-format code in docstrings