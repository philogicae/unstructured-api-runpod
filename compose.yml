name: unstructured-api

services:
  api:
    container_name: unstructured-api
    build:
      context: .
      dockerfile: Dockerfile.test
    image: unstructured-api
    restart: unless-stopped
    ports:
      - "${DOCKER_PORT:-8000}:8000"
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
