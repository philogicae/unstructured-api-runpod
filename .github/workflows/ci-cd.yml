name: CI-CD

on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  lint:
    name: Run ruff and ty 🧪
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv with cache
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.14
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic-dev poppler-utils tesseract-ocr libreoffice
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Run ruff format check
        run: uv run ruff format --check
      - name: Run ruff lint
        run: uv run ruff check
      - name: Run ty check
        run: uv run ty check

  tests:
    name: Run pytest 🧪
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv with cache
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.14
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic-dev poppler-utils tesseract-ocr libreoffice
      - name: Install dependencies
        run: uv sync --dev --frozen
      - name: Run pytest with coverage
        run: |
          uv run pytest -v --tb=no \
            -n auto --timeout=120 \
            --cov=unstructured_api \
            --cov-report=term-missing \
            --cov-report=markdown-append:$GITHUB_STEP_SUMMARY

  publish-to-docker-hub:
    name: >-
      Publish Docker 🐳 image 📦 to Docker Hub
    if: startsWith(github.ref, 'refs/tags/')
    needs: [tests, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_USERNAME }}/unstructured-api-runpod
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
          push: true
          build-args: VERSION=${{ github.ref_name }}
